<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clientes - Bracicla ERP</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        brand: { 50: '#f0fdf4', 100: '#dcfce7', 500: '#22c55e', 600: '#16a34a', 900: '#14532d' },
                        dark: '#0f172a'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-50 font-sans text-slate-800 antialiased flex h-screen overflow-hidden">

    <aside class="w-64 bg-dark text-slate-300 flex flex-col shadow-2xl z-10 hidden md:flex">
         <div class="h-16 flex items-center px-6 border-b border-slate-800 bg-slate-900/50">
              <img src="assets/imagens/logo.png" alt="Logo Bracicla" class="w-8 h-8 mr-3" />
              <span class="text-white font-semibold text-lg tracking-wide">Bracicla</span>
        </div>
        <nav class="flex-1 overflow-y-auto py-4">
            <div class="px-4 mb-2 text-xs font-semibold text-slate-500 uppercase tracking-wider">Principal</div>
            <a href="index.html" class="flex items-center px-6 py-3 hover:bg-slate-800 hover:text-white transition-colors"><i class="fas fa-tachometer-alt w-5 mr-3"></i>Dashboard</a>
            
            <div class="px-4 mt-6 mb-2 text-xs font-semibold text-slate-500 uppercase tracking-wider">Gestão</div>
            <a href="clientes.html" class="flex items-center px-6 py-3 bg-brand-600/10 text-brand-500 border-r-4 border-brand-500"><i class="fas fa-users w-5 mr-3"></i><span class="font-medium">Clientes</span></a>
            <a href="materiais.html" class="flex items-center px-6 py-3 hover:bg-slate-800 hover:text-white transition-colors"><i class="fas fa-box w-5 mr-3"></i>Materiais</a>
            <a href="servicos.html" class="flex items-center px-6 py-3 hover:bg-slate-800 hover:text-white transition-colors"><i class="fas fa-truck w-5 mr-3"></i>Serviços</a>
            <a href="guias.html" class="flex items-center px-6 py-3 hover:bg-slate-800 hover:text-white transition-colors"><i class="fas fa-file-invoice w-5 mr-3"></i>Guias</a>
            
            <div class="px-4 mt-6 mb-2 text-xs font-semibold text-slate-500 uppercase tracking-wider">Finanças</div>
            <a href="faturacao.html" class="flex items-center px-6 py-3 hover:bg-slate-800 hover:text-white transition-colors"><i class="fas fa-chart-line w-5 mr-3"></i>Faturação</a>
        </nav>
        <div class="p-4 border-t border-slate-800 bg-slate-900/30 flex items-center">
            <div class="w-8 h-8 rounded-full bg-brand-500 flex items-center justify-center text-white font-bold text-sm">A</div>
            <div class="ml-3"><p class="text-sm font-medium text-white">Administrador</p></div>
        </div>
    </aside>

    <div class="flex-1 flex flex-col h-screen overflow-hidden relative">
        <header class="h-16 bg-white shadow-sm flex items-center justify-between px-8 z-0">
            <h1 class="text-xl font-semibold text-slate-800">Gestão de Clientes</h1>
        </header>

        <main class="flex-1 overflow-y-auto p-8" id="area-principal">
            
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
                <div class="bg-white rounded-2xl p-6 shadow-[0_2px_10px_-3px_rgba(6,81,237,0.1)] border border-slate-100 transition-all" id="cartao-form-sede">
                    <h3 class="text-lg font-semibold text-slate-800 mb-6 flex items-center"><i class="fas fa-building text-brand-500 mr-2"></i> <span id="titulo-form-sede">1. Adicionar Sede</span></h3>
                    <form id="form-cliente" class="space-y-4">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div><label class="block text-sm font-medium text-slate-700 mb-1">Nome da Empresa</label><input type="text" id="nome" required class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-brand-500 outline-none transition-all"></div>
                            <div><label class="block text-sm font-medium text-slate-700 mb-1">NIF</label><input type="text" id="nif" required class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-brand-500 outline-none transition-all"></div>
                        </div>
                        <div><label class="block text-sm font-medium text-slate-700 mb-1">Morada de Faturação</label><input type="text" id="morada_faturacao" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-brand-500 outline-none transition-all"></div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div><label class="block text-sm font-medium text-slate-700 mb-1">Telefone</label><input type="text" id="telefone" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-brand-500 outline-none transition-all"></div>
                            <div><label class="block text-sm font-medium text-slate-700 mb-1">Email de Faturação</label><input type="email" id="email_faturacao" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-brand-500 outline-none transition-all"></div>
                        </div>
                        <div class="flex gap-2 pt-2">
                            <button type="submit" id="btn-submit-sede" class="flex-1 bg-slate-800 hover:bg-slate-900 text-white font-medium py-2.5 rounded-lg transition-colors">Gravar Sede</button>
                            <button type="button" id="btn-cancelar-sede" onclick="cancelarEdicaoSede()" class="hidden bg-slate-200 hover:bg-slate-300 text-slate-700 font-medium py-2.5 px-4 rounded-lg transition-colors">Cancelar</button>
                        </div>
                    </form>
                </div>

                <div class="bg-white rounded-2xl p-6 shadow-[0_2px_10px_-3px_rgba(6,81,237,0.1)] border border-slate-100 transition-all" id="cartao-form-loja">
                    <h3 class="text-lg font-semibold text-slate-800 mb-6 flex items-center"><i class="fas fa-store text-brand-500 mr-2"></i> <span id="titulo-form-loja">2. Adicionar Loja a uma Sede</span></h3>
                    <form id="form-estabelecimento" class="space-y-4">
                        <div><label class="block text-sm font-medium text-slate-700 mb-1">Escolher Sede</label>
                            <select id="dropdown-sedes" required class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-brand-500 outline-none transition-all bg-white"><option value="">A carregar...</option></select>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div><label class="block text-sm font-medium text-slate-700 mb-1">Nome da Loja</label><input type="text" id="nome_loja" required class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-brand-500 outline-none transition-all"></div>
                            <div><label class="block text-sm font-medium text-slate-700 mb-1">Código SILIAMB (APA)</label><input type="text" id="codigo_apa" required class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-brand-500 outline-none transition-all"></div>
                        </div>
                        <div><label class="block text-sm font-medium text-slate-700 mb-1">Morada da Loja (Local de Recolha Físico)</label><input type="text" id="morada_loja" required class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-brand-500 outline-none transition-all"></div>
                        
                        <div class="flex gap-2 pt-2">
                            <button type="submit" id="btn-submit-loja" class="flex-1 bg-brand-600 hover:bg-brand-700 text-white font-medium py-2.5 rounded-lg transition-colors">Adicionar Loja</button>
                            <button type="button" id="btn-cancelar-loja" onclick="cancelarEdicaoLoja()" class="hidden bg-slate-200 hover:bg-slate-300 text-slate-700 font-medium py-2.5 px-4 rounded-lg transition-colors">Cancelar</button>
                        </div>
                    </form>
                </div>
            </div>

            <div class="bg-white rounded-2xl shadow-[0_2px_10px_-3px_rgba(6,81,237,0.1)] border border-slate-100 overflow-hidden mb-8">
                
                <div class="border-b border-slate-200 bg-slate-50/50 px-6 pt-4 flex space-x-6">
                    <button id="btn-aba-sedes" onclick="alternarAba('sedes')" class="pb-3 px-2 text-sm font-bold border-b-2 border-brand-500 text-brand-600 transition-colors uppercase tracking-wide"><i class="fas fa-building mr-2"></i>Sedes (Faturação)</button>
                    <button id="btn-aba-lojas" onclick="alternarAba('lojas')" class="pb-3 px-2 text-sm font-semibold border-b-2 border-transparent text-slate-500 hover:text-slate-700 transition-colors uppercase tracking-wide"><i class="fas fa-store mr-2"></i>Lojas (Recolha)</button>
                </div>

                <div id="tabela-sedes" class="overflow-x-auto block">
                    <table class="w-full text-sm text-left text-slate-600">
                        <thead class="text-xs text-slate-500 uppercase bg-slate-50 border-b border-slate-100">
                            <tr>
                                <th class="px-6 py-4 font-semibold">Nome da Empresa</th>
                                <th class="px-6 py-4 font-semibold">NIF</th>
                                <th class="px-6 py-4 font-semibold">Contactos</th>
                                <th class="px-6 py-4 font-semibold text-center">Ações</th>
                            </tr>
                        </thead>
                        <tbody id="tbody-sedes" class="divide-y divide-slate-100"></tbody>
                    </table>
                </div>

                <div id="tabela-lojas" class="overflow-x-auto hidden">
                    <table class="w-full text-sm text-left text-slate-600">
                        <thead class="text-xs text-slate-500 uppercase bg-slate-50 border-b border-slate-100">
                            <tr>
                                <th class="px-6 py-4 font-semibold">Sede Pertencente</th>
                                <th class="px-6 py-4 font-semibold">Nome da Loja</th>
                                <th class="px-6 py-4 font-semibold">Código APA</th>
                                <th class="px-6 py-4 font-semibold text-center">Ações</th>
                            </tr>
                        </thead>
                        <tbody id="tbody-lojas" class="divide-y divide-slate-100"></tbody>
                    </table>
                </div>

            </div>
        </main>
    </div>

    <script>
        // Variáveis Globais para guardar os dados e saber se estamos a editar
        let listaSedesGlobais = [];
        let listaLojasGlobais = [];
        let idSedeEmEdicao = null;
        let idLojaEmEdicao = null;

        function alternarAba(aba) {
            const tabSedes = document.getElementById('tabela-sedes'); const tabLojas = document.getElementById('tabela-lojas');
            const btnSedes = document.getElementById('btn-aba-sedes'); const btnLojas = document.getElementById('btn-aba-lojas');

            if(aba === 'sedes') {
                tabSedes.classList.replace('hidden', 'block'); tabLojas.classList.replace('block', 'hidden');
                btnSedes.className = "pb-3 px-2 text-sm font-bold border-b-2 border-brand-500 text-brand-600 transition-colors uppercase tracking-wide";
                btnLojas.className = "pb-3 px-2 text-sm font-semibold border-b-2 border-transparent text-slate-500 hover:text-slate-700 transition-colors uppercase tracking-wide";
            } else {
                tabLojas.classList.replace('hidden', 'block'); tabSedes.classList.replace('block', 'hidden');
                btnLojas.className = "pb-3 px-2 text-sm font-bold border-b-2 border-brand-500 text-brand-600 transition-colors uppercase tracking-wide";
                btnSedes.className = "pb-3 px-2 text-sm font-semibold border-b-2 border-transparent text-slate-500 hover:text-slate-700 transition-colors uppercase tracking-wide";
            }
        }

        async function carregarDados() {
            // 1. CARREGAR SEDES
            const resSedes = await fetch('/sedes');
            listaSedesGlobais = await resSedes.json();
            
            const dropdown = document.getElementById('dropdown-sedes');
            const tbSedes = document.getElementById('tbody-sedes');
            dropdown.innerHTML = '<option value="">Selecione uma Sede...</option>'; 
            tbSedes.innerHTML = '';

            listaSedesGlobais.forEach(s => {
                dropdown.innerHTML += `<option value="${s.id}">${s.nome}</option>`;
                tbSedes.innerHTML += `
                    <tr class="hover:bg-slate-50 transition-colors">
                        <td class="px-6 py-4 font-bold text-slate-800">${s.nome} <br> <span class="text-xs font-normal text-slate-400">${s.morada_faturacao || 'Sem morada'}</span></td>
                        <td class="px-6 py-4">${s.nif}</td>
                        <td class="px-6 py-4 text-xs">
                            <div class="mb-1"><i class="fas fa-phone text-slate-400 mr-1"></i> ${s.telefone || '-'}</div>
                            <div><i class="fas fa-envelope text-slate-400 mr-1"></i> ${s.email_faturacao || '-'}</div>
                        </td>
                        <td class="px-6 py-4 text-center">
                            <button onclick="prepararEdicaoSede(${s.id})" class="text-blue-500 hover:text-blue-700 mr-3 px-2 py-1 bg-blue-50 rounded" title="Editar Sede"><i class="fas fa-edit"></i></button>
                            <button onclick="apagarSede(${s.id})" class="text-red-500 hover:text-red-700 px-2 py-1 bg-red-50 rounded" title="Apagar Sede e Lojas"><i class="fas fa-trash"></i></button>
                        </td>
                    </tr>`;
            });

            // 2. CARREGAR LOJAS
            const resLojas = await fetch('/lojas');
            listaLojasGlobais = await resLojas.json();
            const tbLojas = document.getElementById('tbody-lojas');
            tbLojas.innerHTML = '';

            listaLojasGlobais.forEach(l => {
                tbLojas.innerHTML += `
                    <tr class="hover:bg-slate-50 transition-colors">
                        <td class="px-6 py-4 font-semibold text-slate-800">${l.sede_nome}</td>
                        <td class="px-6 py-4">${l.nome_loja} <br> <span class="text-xs font-normal text-slate-400">${l.morada_local || 'Sem morada'}</span></td>
                        <td class="px-6 py-4"><span class="bg-slate-100 text-slate-700 border border-slate-200 px-3 py-1 rounded-full text-xs font-medium">${l.codigo_apa}</span></td>
                        <td class="px-6 py-4 text-center">
                            <button onclick="prepararEdicaoLoja(${l.id})" class="text-amber-500 hover:text-amber-700 mr-3 px-2 py-1 bg-amber-50 rounded" title="Editar Loja"><i class="fas fa-edit"></i></button>
                            <button onclick="apagarLoja(${l.id})" class="text-red-500 hover:text-red-700 px-2 py-1 bg-red-50 rounded" title="Apagar Loja"><i class="fas fa-trash"></i></button>
                        </td>
                    </tr>`;
            });
        }

        // ==========================================
        // FUNÇÕES DE APAGAR (DELETE)
        // ==========================================
        async function apagarSede(id) {
            if(!confirm('🚨 ATENÇÃO: Apagar esta sede vai apagar TODAS as lojas associadas a ela. Tens a certeza?')) return;
            await fetch(`/clientes/${id}`, { method: 'DELETE' });
            carregarDados();
        }

        async function apagarLoja(id) {
            if(!confirm('Tem a certeza que deseja remover esta loja?')) return;
            await fetch(`/estabelecimentos/${id}`, { method: 'DELETE' });
            carregarDados();
        }

        // ==========================================
        // FUNÇÕES DE PREPARAR EDIÇÃO (UPDATE)
        // ==========================================
        function prepararEdicaoSede(id) {
            const sede = listaSedesGlobais.find(s => s.id === id);
            idSedeEmEdicao = id;
            
            // Preencher Formulário
            document.getElementById('nome').value = sede.nome;
            document.getElementById('nif').value = sede.nif;
            document.getElementById('morada_faturacao').value = sede.morada_faturacao || '';
            document.getElementById('telefone').value = sede.telefone || '';
            document.getElementById('email_faturacao').value = sede.email_faturacao || '';

            // Mudar UI do Botão
            document.getElementById('titulo-form-sede').innerText = "A Editar Sede...";
            document.getElementById('cartao-form-sede').classList.add('border-blue-400', 'ring-2', 'ring-blue-100');
            document.getElementById('btn-submit-sede').innerText = "Atualizar Sede";
            document.getElementById('btn-submit-sede').classList.replace('bg-slate-800', 'bg-blue-600');
            document.getElementById('btn-submit-sede').classList.replace('hover:bg-slate-900', 'hover:bg-blue-700');
            document.getElementById('btn-cancelar-sede').classList.remove('hidden');
            
            document.getElementById('area-principal').scrollTo({ top: 0, behavior: 'smooth' });
        }

        function cancelarEdicaoSede() {
            idSedeEmEdicao = null;
            document.getElementById('form-cliente').reset();
            document.getElementById('titulo-form-sede').innerText = "1. Adicionar Sede";
            document.getElementById('cartao-form-sede').classList.remove('border-blue-400', 'ring-2', 'ring-blue-100');
            document.getElementById('btn-submit-sede').innerText = "Gravar Sede";
            document.getElementById('btn-submit-sede').classList.replace('bg-blue-600', 'bg-slate-800');
            document.getElementById('btn-submit-sede').classList.replace('hover:bg-blue-700', 'hover:bg-slate-900');
            document.getElementById('btn-cancelar-sede').classList.add('hidden');
        }

        function prepararEdicaoLoja(id) {
            const loja = listaLojasGlobais.find(l => l.id === id);
            idLojaEmEdicao = id;
            
            document.getElementById('dropdown-sedes').value = loja.cliente_id;
            document.getElementById('nome_loja').value = loja.nome_loja;
            document.getElementById('codigo_apa').value = loja.codigo_apa;
            document.getElementById('morada_loja').value = loja.morada_local || '';

            document.getElementById('titulo-form-loja').innerText = "A Editar Loja...";
            document.getElementById('cartao-form-loja').classList.add('border-amber-400', 'ring-2', 'ring-amber-100');
            document.getElementById('btn-submit-loja').innerText = "Atualizar Loja";
            document.getElementById('btn-submit-loja').classList.replace('bg-brand-600', 'bg-amber-500');
            document.getElementById('btn-submit-loja').classList.replace('hover:bg-brand-700', 'hover:bg-amber-600');
            document.getElementById('btn-cancelar-loja').classList.remove('hidden');
            
            document.getElementById('area-principal').scrollTo({ top: 0, behavior: 'smooth' });
            alternarAba('lojas'); // Garante que a pessoa está a ver a aba certa
        }

        function cancelarEdicaoLoja() {
            idLojaEmEdicao = null;
            document.getElementById('form-estabelecimento').reset();
            document.getElementById('titulo-form-loja').innerText = "2. Adicionar Loja a uma Sede";
            document.getElementById('cartao-form-loja').classList.remove('border-amber-400', 'ring-2', 'ring-amber-100');
            document.getElementById('btn-submit-loja').innerText = "Adicionar Loja";
            document.getElementById('btn-submit-loja').classList.replace('bg-amber-500', 'bg-brand-600');
            document.getElementById('btn-submit-loja').classList.replace('hover:bg-amber-600', 'hover:bg-brand-700');
            document.getElementById('btn-cancelar-loja').classList.add('hidden');
        }

        // ==========================================
        // SUBMETER FORMULÁRIOS (CRIAR ou ATUALIZAR)
        // ==========================================
        document.getElementById('form-cliente').addEventListener('submit', async function(e) {
            e.preventDefault();
            const dadosSede = { 
                nome: document.getElementById('nome').value, 
                nif: document.getElementById('nif').value,
                morada_faturacao: document.getElementById('morada_faturacao').value,
                telefone: document.getElementById('telefone').value,
                email_faturacao: document.getElementById('email_faturacao').value
            };

            const url = idSedeEmEdicao ? `/clientes/${idSedeEmEdicao}` : '/clientes';
            const metodo = idSedeEmEdicao ? 'PUT' : 'POST';

            const resposta = await fetch(url, { method: metodo, headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(dadosSede) });
            
            if (resposta.ok) { 
                alert(idSedeEmEdicao ? 'Sede Atualizada!' : 'Sede Criada!'); 
                cancelarEdicaoSede(); // Limpa tudo
                carregarDados(); 
            } else { alert('Erro! Verifique os dados (NIF repetido?).'); }
        });

        document.getElementById('form-estabelecimento').addEventListener('submit', async function(e) {
            e.preventDefault();
            const dadosLoja = { 
                cliente_id: document.getElementById('dropdown-sedes').value, 
                nome_loja: document.getElementById('nome_loja').value, 
                codigo_apa: document.getElementById('codigo_apa').value,
                morada_local: document.getElementById('morada_loja').value
            };

            const url = idLojaEmEdicao ? `/estabelecimentos/${idLojaEmEdicao}` : '/estabelecimentos';
            const metodo = idLojaEmEdicao ? 'PUT' : 'POST';

            const resposta = await fetch(url, { method: metodo, headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(dadosLoja) });
            
            if (resposta.ok) { 
                alert(idLojaEmEdicao ? 'Loja Atualizada!' : 'Loja Adicionada!'); 
                cancelarEdicaoLoja();
                carregarDados(); 
                alternarAba('lojas');
            } else { alert('Erro! O Código APA já existe?'); }
        });

        // Iniciar
        carregarDados();
    </script>
</body>
</html>
