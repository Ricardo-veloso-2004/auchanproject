<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Materiais - Bracicla ERP</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        brand: { 50: '#f0fdf4', 100: '#dcfce7', 500: '#22c55e', 600: '#16a34a', 900: '#14532d' },
                        dark: '#0f172a'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-50 font-sans text-slate-800 antialiased flex h-screen overflow-hidden">

    <aside class="w-64 bg-dark text-slate-300 flex flex-col shadow-2xl z-10 hidden md:flex">
        <div class="h-16 flex items-center px-6 border-b border-slate-800 bg-slate-900/50">
              <img src="assets/imagens/logo.png" alt="Logo Bracicla" class="w-8 h-8 mr-3" />
              <span class="text-white font-semibold text-lg tracking-wide">Bracicla</span>
        
        </div>
        <nav class="flex-1 overflow-y-auto py-4">
            <div class="px-4 mb-2 text-xs font-semibold text-slate-500 uppercase tracking-wider">Principal</div>
            <a href="index.html" class="flex items-center px-6 py-3 hover:bg-slate-800 hover:text-white transition-colors"><i class="fas fa-tachometer-alt w-5 mr-3"></i>Dashboard</a>
            
            <div class="px-4 mt-6 mb-2 text-xs font-semibold text-slate-500 uppercase tracking-wider">Gestão</div>
            <a href="clientes.html" class="flex items-center px-6 py-3 hover:bg-slate-800 hover:text-white transition-colors"><i class="fas fa-users w-5 mr-3"></i>Clientes e Lojas</a>
            <a href="materiais.html" class="flex items-center px-6 py-3 bg-brand-600/10 text-brand-500 border-r-4 border-brand-500"><i class="fas fa-box w-5 mr-3"></i><span class="font-medium">Materiais (LER)</span></a>
            <a href="servicos.html" class="flex items-center px-6 py-3 hover:bg-slate-800 hover:text-white transition-colors"><i class="fas fa-truck w-5 mr-3"></i>Serviços e Avenças</a>
            <a href="guias.html" class="flex items-center px-6 py-3 hover:bg-slate-800 hover:text-white transition-colors"><i class="fas fa-file-invoice w-5 mr-3"></i>Guias (e-GAR)</a>
            
            <div class="px-4 mt-6 mb-2 text-xs font-semibold text-slate-500 uppercase tracking-wider">Finanças</div>
            <a href="faturacao.html" class="flex items-center px-6 py-3 hover:bg-slate-800 hover:text-white transition-colors"><i class="fas fa-chart-line w-5 mr-3"></i>Faturação Mensal</a>
        </nav>
        <div class="p-4 border-t border-slate-800 bg-slate-900/30 flex items-center">
            <div class="w-8 h-8 rounded-full bg-brand-500 flex items-center justify-center text-white font-bold text-sm">A</div>
            <div class="ml-3"><p class="text-sm font-medium text-white">Administrador</p></div>
        </div>
    </aside>

    <div class="flex-1 flex flex-col h-screen overflow-hidden">
        
        <header class="h-16 bg-white shadow-sm flex items-center justify-between px-8 z-0">
            <h1 class="text-xl font-semibold text-slate-800">Materiais e Cotações</h1>
        </header>

        <main class="flex-1 overflow-y-auto p-8">
            
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
                <div class="bg-white rounded-2xl p-6 shadow-[0_2px_10px_-3px_rgba(6,81,237,0.1)] border border-slate-100">
                    <h3 class="text-lg font-semibold text-slate-800 mb-6 flex items-center"><i class="fas fa-box-open text-brand-500 mr-2"></i> 1. Adicionar Código LER</h3>
                    <form id="form-material" class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Código LER (Ex: 15 01 01)</label>
                            <input type="text" id="codigo_ler" required class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none transition-all">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Descrição (Ex: Cartão)</label>
                            <input type="text" id="descricao" required class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none transition-all">
                        </div>
                        <button type="submit" class="w-full bg-slate-800 hover:bg-slate-900 text-white font-medium py-2.5 rounded-lg transition-colors mt-2">
                            Gravar Material
                        </button>
                    </form>
                </div>

                <div class="bg-white rounded-2xl p-6 shadow-[0_2px_10px_-3px_rgba(6,81,237,0.1)] border border-slate-100">
                    <h3 class="text-lg font-semibold text-slate-800 mb-6 flex items-center"><i class="fas fa-euro-sign text-brand-500 mr-2"></i> 2. Atualizar Preço (Cotação)</h3>
                    <form id="form-cotacao" class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Escolher Material</label>
                            <select id="dropdown-materiais" required class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none transition-all bg-white">
                                <option value="">A carregar...</option>
                            </select>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-slate-700 mb-1">Preço/Ton (€)</label>
                                <input type="number" step="0.01" id="preco_tonelada" required class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none transition-all">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-slate-700 mb-1">Data de Início</label>
                                <input type="date" id="data_inicio" required class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none transition-all">
                            </div>
                        </div>
                        <button type="submit" class="w-full bg-brand-600 hover:bg-brand-700 text-white font-medium py-2.5 rounded-lg transition-colors mt-2">
                            Atualizar Preço
                        </button>
                    </form>
                </div>
            </div>

            <div class="bg-white rounded-2xl shadow-[0_2px_10px_-3px_rgba(6,81,237,0.1)] border border-slate-100 overflow-hidden">
                <div class="p-6 border-b border-slate-100 bg-slate-50/50">
                    <h3 class="text-lg font-semibold text-slate-800 flex items-center"><i class="fas fa-list text-slate-400 mr-2"></i> Lista de Materiais e Preço Atual</h3>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-sm text-left text-slate-600">
                        <thead class="text-xs text-slate-500 uppercase bg-slate-50 border-b border-slate-100">
                            <tr>
                                <th class="px-6 py-4 font-semibold">Código LER</th>
                                <th class="px-6 py-4 font-semibold">Descrição</th>
                                <th class="px-6 py-4 font-semibold text-right">Preço Atual (€/Ton)</th>
                            </tr>
                        </thead>
                        <tbody id="tabela-materiais" class="divide-y divide-slate-100">
                            </tbody>
                    </table>
                </div>
            </div>

        </main>
    </div>

    <script>
        async function carregarMateriais() {
            const resposta = await fetch('/materiais');
            const materiais = await resposta.json();
            
            const tabela = document.getElementById('tabela-materiais');
            const dropdown = document.getElementById('dropdown-materiais');
            
            tabela.innerHTML = ''; 
            dropdown.innerHTML = '<option value="">Selecione um Material...</option>';
            
            materiais.forEach(m => {
                // Se tiver preço formata bonito, senão mostra um alerta vermelho suave
                const preco = m.preco_atual 
                    ? `<span class="font-bold text-slate-800">${m.preco_atual} €</span>` 
                    : `<span class="bg-rose-100 text-rose-600 px-2 py-1 rounded text-xs font-medium">Sem preço</span>`;
                
                tabela.innerHTML += `
                <tr class="hover:bg-slate-50 transition-colors">
                    <td class="px-6 py-4 font-semibold text-slate-800">${m.codigo_ler}</td>
                    <td class="px-6 py-4">${m.descricao}</td>
                    <td class="px-6 py-4 text-right">${preco}</td>
                </tr>`;
                
                dropdown.innerHTML += `<option value="${m.id}">${m.codigo_ler} - ${m.descricao}</option>`;
            });
        }

        document.getElementById('form-material').addEventListener('submit', async function(e) {
            e.preventDefault();
            const novoMaterial = { codigo_ler: document.getElementById('codigo_ler').value, descricao: document.getElementById('descricao').value };
            const resposta = await fetch('/materiais', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(novoMaterial) });
            if (resposta.ok) { alert('Material criado!'); document.getElementById('form-material').reset(); carregarMateriais(); }
        });

        document.getElementById('form-cotacao').addEventListener('submit', async function(e) {
            e.preventDefault();
            const novaCotacao = { material_id: document.getElementById('dropdown-materiais').value, preco_tonelada: document.getElementById('preco_tonelada').value, data_inicio: document.getElementById('data_inicio').value };
            const resposta = await fetch('/cotacoes', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(novaCotacao) });
            if (resposta.ok) { alert('Preço atualizado!'); document.getElementById('form-cotacao').reset(); carregarMateriais(); }
        });

        carregarMateriais();
        document.getElementById('data_inicio').valueAsDate = new Date();
    </script>
</body>
</html>
